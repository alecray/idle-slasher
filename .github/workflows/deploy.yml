name: Deploy to itch.io

on:
  push:
    branches:
      - main

env:
  GODOT_VERSION: "4.6"

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable \
             ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable

      - name: Export
        run: |
          mkdir -v -p exports/web
          godot --headless --export-release "Web" exports/web/index.html

      - name: Deploy to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: html5
          ITCH_GAME: idle-slasher
          ITCH_USER: alecray
          PACKAGE: exports/web
          VERSION: ${{ github.run_number }}
