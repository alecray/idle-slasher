name: Deploy to itch.io

on:
  push:
    branches:
      - main

env:
  GODOT_VERSION: "4.6"

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable \
             ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable

      - name: Export
        run: |
          mkdir -v -p exports/web
          godot --headless --export-release "Web" exports/web/index.html

      - name: Install butler
        run: |
          wget -O butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push exports/web alecray/idle-slasher:html5 --userversion ${{ github.run_number }}
